<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body{
            background-image: url(https://media.istockphoto.com/id/1330248664/vector/hexagonal-and-rectangular-abstracts-with-a-digital-network-image-blue-gradient-background.jpg?s=612x612&w=0&k=20&c=JgeKAVSAO_S-A0r61OP99BqNduP0CXE7gvc0jjoAD4Q=);
            background-size: cover;
        }
     .main{
        border: 2px solid black;
        width: 160px;
        background-color: black;
        margin: 30%;
        margin-top: 10%; 
        margin-left: 40%;
       
        
    
      
     }
    .value {
        width: 125px;
        padding: 10px;
        margin: 5px;
        background-color:white;
        outline:none;
     }
     button{
        padding: 10px;
        margin: 2px;
        margin-left: 4px;
        width: 30px;
        text-align: center;
        cursor: pointer;
     }
     .esc{
        background-color: red;

     }
     .answer{
        background-color: rgb(24, 56, 24);
     }
     h1{
        color: rgb(255, 0, 255);
        text-decoration: underline;
        font-size: 50px;
        text-align: center;
     }
     h1:hover{
        color: greenyellow;
     }
     
     
    </style>
</head>
<body>
    <h1>ARITHMETIC CALCULATOR</h1>
     <div class="main">
        <div class="scn">
            <input type="text" name="screen" class="value" placeholder="0">
        </div>
        
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="esc">C</button><br>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>x</button><br>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>-</button><br>
            <button>0</button>
            <button>.</button>
            <button class="answer">=</button>
            <button>+</button> 


       
    
</body>
</html>
